<div class="container m-b-20 layout-row align-end gap-20px">
  <div #buttonCreateDelinquencyRange class="in-block" *mifosxHasPermission="'CREATE_DELINQUENCY_BUCKET'">
    <button mat-raised-button color="primary" [matMenuTriggerFor]="createMenu">
      {{ 'labels.buttons.Create' | translate }}
      <fa-icon icon="caret-down" class="m-l-10"></fa-icon>
    </button>
    <mat-menu #createMenu="matMenu">
      <button mat-menu-item [routerLink]="['create']" [queryParams]="{ bucketType: 'regular' }">
        <fa-icon icon="calendar-alt" class="m-r-10"></fa-icon>
        {{ 'labels.catalogs.Regular' | translate }} {{ 'labels.inputs.Delinquency Bucket' | translate }}
      </button>
      <button mat-menu-item [routerLink]="['create']" [queryParams]="{ bucketType: 'workingcapital' }">
        <fa-icon icon="money-bill-alt" class="m-r-10"></fa-icon>
        {{ 'labels.catalogs.Working Capital' | translate }} {{ 'labels.inputs.Delinquency Bucket' | translate }}
      </button>
    </mat-menu>
  </div>
</div>

<div class="container">
  <div class="layout-row">
    <mat-form-field class="flex-fill">
      <mat-label>{{ 'labels.inputs.Filter' | translate }}</mat-label>
      <input matInput (keyup)="applyFilter($event.target.value)" />
    </mat-form-field>
  </div>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Name' | translate }}</th>
        <td mat-cell *matCellDef="let delinquencyBucket">{{ delinquencyBucket.name }}</td>
      </ng-container>
      <ng-container matColumnDef="bucketType">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'labels.inputs.Type' | translate }}</th>
        <td mat-cell *matCellDef="let delinquencyBucket">
          {{ bucketTypeLabel(delinquencyBucket.bucketType.id) | translateKey: 'catalogs' }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [routerLink]="[row.id]"
        [queryParams]="{ bucketType: bucketType(row.bucketType.id) }"
        class="select-row"
      ></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
