@if (!hideOutput) {
  <iframe
    [src]="birtUrl"
    [title]="'BIRT report: ' + (dataObject?.report?.name || 'report')"
    sandbox="allow-same-origin allow-forms"
    frameborder="0"
    width="100%"
    height="750px;"
  ></iframe>
}
